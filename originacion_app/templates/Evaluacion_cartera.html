{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2>Evaluación de Cartera</h2>
    <form id="saldos-form" action="{% url 'evaluacion_cartera' %}" method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label for="fecha_corte" class="form-label">Fecha de Corte:</label>
            <input type="date" id="fecha_corte" name="fecha_corte" class="form-control" required>
        </div>

        <div class="d-flex gap-2">
            <!-- Exportar Excel -->
            <button type="submit" name="accion" value="exportar" class="btn btn-success rounded-pill" title="Exportar Excel">
                <i class="bi bi-box-arrow-down"></i> Exportar Excel
            </button>

            <!-- Exportar CSV -->
            <button type="submit" name="accion" value="csv" class="btn btn-primary rounded-pill" title="Exportar CSV">
                <i class="bi bi-filetype-csv"></i> Exportar CSV
            </button>
        </div>
    </form>
</div>

<!-- Script para cambiar dinámicamente el target según el botón -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('saldos-form');

        form.addEventListener('submit', function (e) {
            const clickedButton = document.activeElement;

            if (clickedButton.name === 'accion' && clickedButton.value === 'exportar') {
                form.setAttribute('target', '_blank');  // Abre en nueva pestaña (Excel)
            } else {
                form.removeAttribute('target');  // CSV en misma pestaña
            }
        });
    });
</script>
{% endblock %}
