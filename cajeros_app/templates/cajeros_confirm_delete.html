{% extends 'base.html' %}
{% block content %}
<h2>Confirmar eliminación</h2>
<p>¿Está seguro de que desea eliminar al cajero {{ object.user.username }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'cajeros_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
