{% extends "base.html" %}
{% block title %}Confirmar Eliminación{% endblock %}
{% block content %}
<div class="container">
    <h2><i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación</h2>
    <p>¿Estás seguro de que deseas eliminar el perfil de <strong>{{ profile.user.username }}</strong>?</p>
    <form method="post" class="form-container">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash-alt"></i> Eliminar</button>
        <a href="{% url 'profile_list' %}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Cancelar</a>
    </form>
</div>
{% endblock %}
