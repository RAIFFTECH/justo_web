<h1>Confirmar Eliminación de Movimiento de Caja</h1>
<p>¿Estás seguro de que deseas eliminar este movimiento de caja?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'mov_caja_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
